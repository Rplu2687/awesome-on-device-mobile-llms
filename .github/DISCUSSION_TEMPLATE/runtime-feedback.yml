title: Runtime feedback or benchmark
labels:
  - runtime-feedback
body:
  - type: markdown
    attributes:
      value: |
        Share on-device LLM runtime experience — especially **llama.cpp**, **LiteRT**, or comparisons between engines. DataSapien is actively experimenting with LiteRT-LM; community data helps shape our lab reports.

        Include device, OS, model, quantization, and how you measured. Do not paste unsourced numbers as facts without your measurement method.

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - llama.cpp
        - LiteRT / LiteRT-LM
        - Cactus
        - MLX
        - Core ML
        - Other
        - Comparison (multiple runtimes)
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and OS
      placeholder: e.g. iPhone 15 Pro, iOS 18.2 / Pixel 8, Android 15
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model and quantization
      placeholder: e.g. Qwen 2.5 3B Instruct, Q4_K_M
    validations:
      required: true

  - type: textarea
    id: results
    attributes:
      label: Results
      description: Latency (TTFT, tokens/sec), memory, quality notes, thermal/battery if measured.
      placeholder: |
        - Load time:
        - TTFT (prompt length):
        - Decode speed:
        - Peak memory:
        - Quality vs expectations:
    validations:
      required: true

  - type: textarea
    id: method
    attributes:
      label: Measurement method
      description: Cold vs warm start, prompt fixture, tooling used.
      placeholder: e.g. Warm start, 32-token system + 20-token user prompt, Android Studio Profiler for memory.

  - type: textarea
    id: context
    attributes:
      label: Use case context
      description: What task was this for? DIY app or DataSapien SDK?
      placeholder: e.g. Intent classification routing in a retail app search box.
